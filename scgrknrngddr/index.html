<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seç görək nə rəngdədir?</title>
    <meta name="google-site-verification" content="k8es8HNjA3GTC_C3iM37CJhxFTH8k5pIrSb8S86GOvg" />
    <!-- Custom Font -->
    <link rel="stylesheet" href="style.css">
   <script defer src="questions.js"></script>
<script type="module" src="firebase.js"></script>
<script defer src="script.js"></script>
</head>
<body>
    <!-- Global Mute Button -->
    <div id="mute-btn" class="mute-btn" onclick="toggleMute(event)"><svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg></div>

    <!-- Home Screen -->
    <div id="home-screen" class="screen active">
        <div id="particles-container"></div>
        <div class="home-content">
            <h1 class="main-title"><span>Seç görək</span><br><span>nə rəngdədir?</span></h1>
            <p class="subtitle typewriter"></p>
            <div class="categories" id="category-container">
                <!-- Categories injected here -->
            </div>
        </div>
        <div class="signature">ADA Students tərəfindən hazırlanıb</div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
        <div class="back-btn" id="back-btn">← Geri</div>
        <div class="game-board">
            <div id="option-left" class="option left-option" onclick="selectOption('left')">
                <div class="option-text" id="text-left"></div>
                <div class="results-container">
                    <div class="percentage" id="perc-left">0%</div>
                    <div class="progress-bar"><div class="progress-fill" id="fill-left"></div></div>
                </div>
            </div>
            <div id="option-right" class="option right-option" onclick="selectOption('right')">
                <div class="option-text" id="text-right"></div>
                <div class="results-container">
                    <div class="percentage" id="perc-right">0%</div>
                    <div class="progress-bar"><div class="progress-fill" id="fill-right"></div></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
